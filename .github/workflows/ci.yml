name: CI

on:
    push:
        branches: [master]
    pull_request:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always

jobs:
    changes:
        name: Detect changes
        runs-on: ubuntu-latest
        outputs:
            code: ${{ steps.filter.outputs.code }}
        steps:
            - uses: actions/checkout@v6

            - uses: dorny/paths-filter@v4
              id: filter
              with:
                  filters: |
                      code:
                        - 'crates/**'
                        - 'wayle/**'
                        - 'resources/**'
                        - 'scripts/**'
                        - 'packaging/**'
                        - 'Cargo.*'
                        - '.github/workflows/ci.yml'

    # Lint + test + schema share one container so the workspace and its
    # dependencies compile once into a single target dir, then clippy, the test
    # build, and `cargo run` reuse those artifacts — instead of three separate
    # containers each compiling from scratch.
    check:
        name: Check (lint + test + schema)
        needs: changes
        if: needs.changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/stubbedev/wayle/ci-arch:latest
        env:
            RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
        steps:
            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Fix Git ownership
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            - uses: Swatinem/rust-cache@v2

            - name: Check formatting
              run: cargo +nightly fmt --all --check

            - name: Clippy
              run: cargo clippy --workspace --all-targets -- -D warnings

            - name: Check icons exist
              run: ./scripts/ci/check-icons.sh

            - name: Run tests
              run: cargo test --workspace --no-fail-fast

            - name: Check config schema is up to date
              run: |
                  cargo run -q -p wayle -- config schema --stdout | jq -S . > /tmp/wayle-config.schema.json
                  if ! diff -u schema/wayle-config.schema.json /tmp/wayle-config.schema.json; then
                    echo "::error::Config schema is out of date. Regenerate with:"
                    echo "  cargo run -p wayle -- config schema --stdout | jq -S . > schema/wayle-config.schema.json"
                    exit 1
                  fi

    ubuntu:
        name: Package (Ubuntu)
        needs: changes
        if: needs.changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/stubbedev/wayle/ci-ubuntu:latest
        # CI only validates that packaging works; nothing here ships (release
        # artifacts come from release.yml). So build debug — same package
        # layout, far less compile time than --release. Release-only breakage
        # is still caught by the `nix` job, which builds release.
        env:
            RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Fix Git ownership
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            - uses: Swatinem/rust-cache@v2

            - name: Build workspace
              run: cargo build --workspace --locked

            - name: Build archive
              id: archive
              run: |
                  VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{/^version/p}' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
                  ./scripts/ci/build-archive.sh target/debug "${VERSION}" x86_64
                  echo "archive=wayle-${VERSION}-x86_64-linux.tar.gz" >> "$GITHUB_OUTPUT"
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Build Ubuntu package
              run: ./scripts/ci/build-packages.sh "${{ steps.archive.outputs.archive }}" "${{ steps.archive.outputs.version }}" deb

    fedora:
        name: Package (Fedora)
        needs: changes
        if: needs.changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/stubbedev/wayle/ci-fedora:latest
        # Debug build — CI validates packaging only, nothing ships here. See
        # the ubuntu job for rationale.
        env:
            RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Fix Git ownership
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            - uses: Swatinem/rust-cache@v2

            - name: Build workspace
              run: cargo build --workspace --locked

            - name: Build archive
              id: archive
              run: |
                  VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{/^version/p}' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
                  ./scripts/ci/build-archive.sh target/debug "${VERSION}" x86_64
                  echo "archive=wayle-${VERSION}-x86_64-linux.tar.gz" >> "$GITHUB_OUTPUT"
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Build Fedora package
              run: ./scripts/ci/build-packages.sh "${{ steps.archive.outputs.archive }}" "${{ steps.archive.outputs.version }}" rpm

    nix:
        name: Nix build + cache
        needs: changes
        # Always build + push on master so the cache tracks every commit (a
        # docs/schema-only commit still rebuilds — mostly cache hits, but keeps
        # the binary present). On PRs, only when code changed, and push is
        # suppressed because the attic-action step is master-only.
        if: >-
            needs.changes.outputs.code == 'true' ||
            (github.event_name == 'push' && github.ref == 'refs/heads/master')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - uses: cachix/install-nix-action@v31
              with:
                  extra_nix_config: |
                      experimental-features = nix-command flakes
                      # Pull from the self-hosted attic cache on every event
                      # (incl. fork PRs — read access is public, no secret).
                      extra-substituters = https://nix.stubbe.dev/wayle
                      extra-trusted-public-keys = wayle:XD2O2h1Mmka+VegRi2JY7ywNbG9al+TUAZp6CObizFU=

            # Push everything built during this run to the attic cache. The
            # action installs a cached attic-client (no `nix run` cold eval) and
            # pushes in a post-job step. master-only: PRs/forks lack the token
            # and just pull via the substituter above.
            - name: Setup attic push
              if: github.event_name == 'push' && github.ref == 'refs/heads/master'
              uses: ryanccn/attic-action@v0
              with:
                  endpoint: https://nix.stubbe.dev
                  cache: wayle
                  token: ${{ secrets.ATTIC_TOKEN }}

            - name: Build package
              run: nix build '.?submodules=1#wayle' -L

    ci-status:
        name: CI Status
        if: always()
        needs: [check, ubuntu, fedora, nix]
        runs-on: ubuntu-latest
        steps:
            - name: Check results
              run: |
                  if [[ "${{ needs.check.result }}" == "failure" || \
                        "${{ needs.ubuntu.result }}" == "failure" || \
                        "${{ needs.nix.result }}" == "failure" || \
                        "${{ needs.fedora.result }}" == "failure" ]]; then
                    echo "One or more checks failed"
                    exit 1
                  fi
                  echo "All checks passed or were skipped"
