name: CI

on:
    push:
        branches: [master]
    pull_request:

permissions:
    contents: read

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always

jobs:
    changes:
        name: Detect changes
        runs-on: ubuntu-latest
        outputs:
            code: ${{ steps.filter.outputs.code }}
        steps:
            - uses: actions/checkout@v6

            - uses: dorny/paths-filter@v3
              id: filter
              with:
                  filters: |
                      code:
                        - 'crates/**'
                        - 'wayle/**'
                        - 'resources/**'
                        - 'scripts/**'
                        - 'packaging/**'
                        - 'Cargo.*'
                        - '.github/workflows/ci.yml'

    lint:
        name: Lint
        needs: changes
        if: needs.changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        container:
            image: archlinux:base-devel
        steps:
            - name: Install dependencies
              run: |
                  pacman --noconfirm --needed -Syu \
                    git \
                    rustup \
                    clang \
                    gtk4 \
                    gtk4-layer-shell \
                    gtksourceview5 \
                    libpulse \
                    fftw \
                    libpipewire \
                    systemd-libs \
                    gstreamer

            - name: Setup Rust
              run: |
                  rustup default stable
                  rustup toolchain install nightly --component rustfmt
                  rustup component add clippy

            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - uses: Swatinem/rust-cache@v2

            - name: Check formatting
              run: cargo +nightly fmt --all --check

            - name: Clippy
              run: cargo clippy --workspace --all-targets -- -D warnings

            - name: Check icons exist
              run: ./scripts/ci/check-icons.sh

    test:
        name: Test
        needs: changes
        if: needs.changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        container:
            image: archlinux:base-devel
        steps:
            - name: Install dependencies
              run: |
                  pacman --noconfirm --needed -Syu \
                    git \
                    rustup \
                    clang \
                    gtk4 \
                    gtk4-layer-shell \
                    gtksourceview5 \
                    libpulse \
                    fftw \
                    libpipewire \
                    systemd-libs \
                    gstreamer

            - name: Setup Rust
              run: rustup default stable

            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - uses: Swatinem/rust-cache@v2

            - name: Run tests
              run: cargo test --workspace --no-fail-fast

    schema:
        name: Config schema
        needs: changes
        if: needs.changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        container:
            image: archlinux:base-devel
        steps:
            - name: Install dependencies
              run: |
                  pacman --noconfirm --needed -Syu \
                    git \
                    rustup \
                    clang \
                    gtk4 \
                    gtk4-layer-shell \
                    gtksourceview5 \
                    libpulse \
                    fftw \
                    libpipewire \
                    systemd-libs \
                    gstreamer \
                    jq

            - name: Setup Rust
              run: rustup default stable

            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - uses: Swatinem/rust-cache@v2

            - name: Check config schema is up to date
              run: |
                  cargo run -q -p wayle -- config schema --stdout | jq -S . > /tmp/wayle-config.schema.json
                  if ! diff -u schema/wayle-config.schema.json /tmp/wayle-config.schema.json; then
                    echo "::error::Config schema is out of date. Regenerate with:"
                    echo "  cargo run -p wayle -- config schema --stdout | jq -S . > schema/wayle-config.schema.json"
                    exit 1
                  fi

    build:
        name: Build
        needs: changes
        if: needs.changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        container:
            image: archlinux:base-devel
        steps:
            - name: Install dependencies
              run: |
                  pacman --noconfirm --needed -Syu \
                    git \
                    rustup \
                    clang \
                    gtk4 \
                    gtk4-layer-shell \
                    gtksourceview5 \
                    libpulse \
                    fftw \
                    libpipewire \
                    systemd-libs \
                    gstreamer

            - name: Setup Rust
              run: rustup default stable

            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - uses: Swatinem/rust-cache@v2

            - name: Build workspace
              run: cargo build --workspace --release

            - name: Build archive
              id: archive
              run: |
                  VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{/^version/p}' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
                  ./scripts/ci/build-archive.sh target/release "${VERSION}" x86_64
                  echo "archive=wayle-${VERSION}-x86_64-linux.tar.gz" >> "$GITHUB_OUTPUT"
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

    ubuntu:
        name: Package (Ubuntu)
        needs: changes
        if: needs.changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        container:
            image: ubuntu:latest
        steps:
            - name: Install dependencies
              run: |
                  apt-get update
                  apt-get install -y --no-install-recommends \
                    build-essential \
                    ca-certificates \
                    clang \
                    cmake \
                    curl \
                    debhelper \
                    desktop-file-utils \
                    dpkg-dev \
                    git \
                    libfftw3-dev \
                    libgstreamer1.0-dev \
                    libgtk-4-dev \
                    libgtk4-layer-shell-dev \
                    libgtksourceview-5-dev \
                    libpipewire-0.3-dev \
                    libpulse-dev \
                    libudev-dev \
                    libxkbcommon-dev \
                    pkg-config

            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Fix Git ownership
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            - name: Setup Rust
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  toolchain: stable

            - name: Build workspace
              run: cargo build --workspace --release --locked

            - name: Build archive
              id: archive
              run: |
                  VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{/^version/p}' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
                  ./scripts/ci/build-archive.sh target/release "${VERSION}" x86_64
                  echo "archive=wayle-${VERSION}-x86_64-linux.tar.gz" >> "$GITHUB_OUTPUT"
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Build Ubuntu package
              run: ./scripts/ci/build-packages.sh "${{ steps.archive.outputs.archive }}" "${{ steps.archive.outputs.version }}" deb

    fedora:
        name: Package (Fedora)
        needs: changes
        if: needs.changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        container:
            image: fedora:latest
        steps:
            - name: Install dependencies
              run: |
                  dnf -y install \
                    clang \
                    cmake \
                    fftw-devel \
                    gcc \
                    git \
                    gtk4-devel \
                    gtk4-layer-shell-devel \
                    gtksourceview5-devel \
                    gstreamer1-devel \
                    libxkbcommon-devel \
                    make \
                    pipewire-devel \
                    pkgconf-pkg-config \
                    pulseaudio-libs-devel \
                    rpm-build \
                    systemd-devel

            - name: Checkout repository
              uses: actions/checkout@v6

            - name: Fix Git ownership
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            - name: Install RPM build dependencies
              run: |
                  VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{/^version/p}' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
                  DATE="$(LC_ALL=C date '+%a %b %d %Y')"
                  sed \
                    -e "s/@VERSION@/${VERSION}/g" \
                    -e "s/@DATE@/${DATE}/g" \
                    packaging/rpm/wayle.spec.in >/tmp/wayle.spec
                  dnf -y --setopt=install_weak_deps=False builddep /tmp/wayle.spec

            - name: Setup Rust
              uses: actions-rust-lang/setup-rust-toolchain@v1
              with:
                  toolchain: stable

            - name: Build workspace
              run: cargo build --workspace --release --locked

            - name: Build archive
              id: archive
              run: |
                  VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{/^version/p}' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
                  ./scripts/ci/build-archive.sh target/release "${VERSION}" x86_64
                  echo "archive=wayle-${VERSION}-x86_64-linux.tar.gz" >> "$GITHUB_OUTPUT"
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Build Fedora package
              run: ./scripts/ci/build-packages.sh "${{ steps.archive.outputs.archive }}" "${{ steps.archive.outputs.version }}" rpm

    nix:
        name: Nix build + cache
        needs: changes
        # Always build + push on master so the cache tracks every commit (a
        # docs/schema-only commit still rebuilds — mostly cache hits, but keeps
        # the binary present). On PRs, only when code changed, and push is
        # suppressed by pushFilter below.
        if: >-
            needs.changes.outputs.code == 'true' ||
            (github.event_name == 'push' && github.ref == 'refs/heads/master')
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - uses: cachix/install-nix-action@v31
              with:
                  extra_nix_config: |
                      experimental-features = nix-command flakes

            - uses: cachix/cachix-action@v16
              with:
                  name: wayle
                  # Empty on fork PRs (secret absent) — cachix still serves as a
                  # substituter, it just won't push.
                  authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
                  # Push only from master; PR builds validate but don't pollute
                  # the cache. pushFilter is a regex of paths to EXCLUDE, so
                  # '.*' excludes everything (no push), '' excludes nothing.
                  pushFilter: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/master') && '' || '.*' }}

            - name: Build package
              run: nix build .#wayle -L

    ci-status:
        name: CI Status
        if: always()
        needs: [lint, test, build, ubuntu, fedora, nix]
        runs-on: ubuntu-latest
        steps:
            - name: Check results
              run: |
                  if [[ "${{ needs.lint.result }}" == "failure" || \
                        "${{ needs.test.result }}" == "failure" || \
                        "${{ needs.build.result }}" == "failure" || \
                        "${{ needs.ubuntu.result }}" == "failure" || \
                        "${{ needs.nix.result }}" == "failure" || \
                        "${{ needs.fedora.result }}" == "failure" ]]; then
                    echo "One or more checks failed"
                    exit 1
                  fi
                  echo "All checks passed or were skipped"
