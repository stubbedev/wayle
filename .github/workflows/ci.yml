name: CI

on:
    push:
        branches: [master]
    pull_request:

permissions:
    contents: read

# Cancel superseded runs on PRs (fast feedback on fixup pushes), but NEVER on
# master: the nix job populates the attic cache + GH /nix/store cache in its
# post-steps, and a follow-up master push must not cancel that mid-build —
# doing so leaves the cache unpopulated and forces the next run to recompile
# wayle-deps from scratch (~30 min). Master runs queue instead of cancelling,
# which also warms the cache sequentially: run N populates what run N+1 hits.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
    CARGO_TERM_COLOR: always
    # Keep the runner's root disk from filling (the "No space left on device"
    # failures). CI never debugs the binaries, so drop debuginfo — the largest
    # part of a debug `target/` — and disable incremental artifacts, which add
    # large per-crate caches with no cross-run value here. The container jobs
    # (check/ubuntu/fedora) can't free host tool caches from inside the
    # container, so shrinking what we generate is the durable lever.
    CARGO_INCREMENTAL: "0"
    CARGO_PROFILE_DEV_DEBUG: "0"
    CARGO_PROFILE_TEST_DEBUG: "0"

jobs:
    changes:
        name: Detect changes
        runs-on: ubuntu-latest
        outputs:
            code: ${{ steps.filter.outputs.code }}
        steps:
            - uses: actions/checkout@v6

            - uses: dorny/paths-filter@v4
              id: filter
              with:
                  filters: |
                      code:
                        - 'crates/**'
                        - 'wayle/**'
                        - 'resources/**'
                        - 'scripts/**'
                        - 'packaging/**'
                        - 'Cargo.*'
                        - '.github/workflows/ci.yml'

    # Lint + test + schema share one container so the workspace and its
    # dependencies compile once into a single target dir, then clippy, the test
    # build, and `cargo run` reuse those artifacts — instead of three separate
    # containers each compiling from scratch.
    check:
        name: Check (lint + test + schema)
        needs: changes
        if: needs.changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/stubbedev/wayle/ci-arch:latest
        env:
            RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
        steps:
            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Fix Git ownership
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            # Save the cargo cache only on master; PRs restore it but don't
            # write their own. Per-PR rust caches share the same hard 10 GiB
            # repo cache budget as the nix /nix/store cache, and evicting that
            # nix cache is what forced wayle-deps to recompile every run.
            - uses: Swatinem/rust-cache@v2
              with:
                  save-if: ${{ github.ref == 'refs/heads/master' }}

            - name: Check formatting
              run: cargo +nightly fmt --all --check

            - name: Clippy
              run: cargo clippy --workspace --all-targets -- -D warnings

            - name: Check icons exist
              run: ./scripts/ci/check-icons.sh

            - name: Run tests
              run: cargo test --workspace --no-fail-fast

            - name: Check config schema is up to date
              run: |
                  cargo run -q -p wayle -- config schema --stdout | jq -S . > /tmp/wayle-config.schema.json
                  if ! diff -u schema/wayle-config.schema.json /tmp/wayle-config.schema.json; then
                    echo "::error::Config schema is out of date. Regenerate with:"
                    echo "  cargo run -p wayle -- config schema --stdout | jq -S . > schema/wayle-config.schema.json"
                    exit 1
                  fi

    ubuntu:
        name: Package (Ubuntu)
        needs: changes
        if: needs.changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/stubbedev/wayle/ci-ubuntu:latest
        # CI only validates that packaging works; nothing here ships (release
        # artifacts come from release.yml). So build debug — same package
        # layout, far less compile time than --release. Release-only breakage
        # is still caught by the `nix` job, which builds release.
        env:
            RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Fix Git ownership
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            # Save the cargo cache only on master; PRs restore it but don't
            # write their own. Per-PR rust caches share the same hard 10 GiB
            # repo cache budget as the nix /nix/store cache, and evicting that
            # nix cache is what forced wayle-deps to recompile every run.
            - uses: Swatinem/rust-cache@v2
              with:
                  save-if: ${{ github.ref == 'refs/heads/master' }}

            - name: Build workspace
              run: cargo build --workspace --locked

            - name: Build archive
              id: archive
              run: |
                  VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{/^version/p}' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
                  ./scripts/ci/build-archive.sh target/debug "${VERSION}" x86_64
                  echo "archive=wayle-${VERSION}-x86_64-linux.tar.gz" >> "$GITHUB_OUTPUT"
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Build Ubuntu package
              run: ./scripts/ci/build-packages.sh "${{ steps.archive.outputs.archive }}" "${{ steps.archive.outputs.version }}" deb

    fedora:
        name: Package (Fedora)
        needs: changes
        if: needs.changes.outputs.code == 'true'
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/stubbedev/wayle/ci-fedora:latest
        # Debug build — CI validates packaging only, nothing ships here. See
        # the ubuntu job for rationale.
        env:
            RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Fix Git ownership
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            # Save the cargo cache only on master; PRs restore it but don't
            # write their own. Per-PR rust caches share the same hard 10 GiB
            # repo cache budget as the nix /nix/store cache, and evicting that
            # nix cache is what forced wayle-deps to recompile every run.
            - uses: Swatinem/rust-cache@v2
              with:
                  save-if: ${{ github.ref == 'refs/heads/master' }}

            - name: Build workspace
              run: cargo build --workspace --locked

            - name: Build archive
              id: archive
              run: |
                  VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{/^version/p}' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
                  ./scripts/ci/build-archive.sh target/debug "${VERSION}" x86_64
                  echo "archive=wayle-${VERSION}-x86_64-linux.tar.gz" >> "$GITHUB_OUTPUT"
                  echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

            - name: Build Fedora package
              run: ./scripts/ci/build-packages.sh "${{ steps.archive.outputs.archive }}" "${{ steps.archive.outputs.version }}" rpm

    nix:
        name: Nix build + cache
        needs: changes
        # Always build + push on master so the cache tracks every commit (a
        # docs/schema-only commit still runs — mostly cache hits once wayle-deps
        # is cached, but keeps the binary present). On PRs, only when code
        # changed. Same-repo PRs also push to attic (see the push step), so a
        # deps bump compiled in a PR is a cache hit when it merges to master
        # instead of a fresh ~30 min rebuild.
        if: >-
            needs.changes.outputs.code == 'true' ||
            (github.event_name == 'push' && github.ref == 'refs/heads/master')
        runs-on: ubuntu-latest
        steps:
            # Reclaim ~25 GiB of preinstalled tool caches (android/dotnet/etc.)
            # before the release nix build. This job runs on the host (no
            # container), so it can free host paths the container jobs can't.
            - name: Free disk space
              uses: jlumbroso/free-disk-space@main
              with:
                  tool-cache: true
                  large-packages: false
                  docker-images: false
                  swap-storage: false

            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - uses: cachix/install-nix-action@v31
              with:
                  extra_nix_config: |
                      experimental-features = nix-command flakes
                      # Pull from the self-hosted attic cache on every event
                      # (incl. fork PRs — read access is public, no secret).
                      extra-substituters = https://nix.stubbe.dev/wayle
                      extra-trusted-public-keys = wayle:XD2O2h1Mmka+VegRi2JY7ywNbG9al+TUAZp6CObizFU=

            # Restore /nix/store from the GitHub Actions cache so the big
            # `wayle-deps` derivation (591 crates, ~30 min) is reused instead of
            # recompiled. Keyed on the lockfiles + nix expr — the only inputs to
            # wayle-deps. Runs on every event; PRs restore master's cache.
            #
            # SAVE is split out below and gated to master pushes. Previously the
            # combined action also saved on PRs, and each PR's branch-scoped
            # ~3.2 GiB /nix/store cache counted against GitHub's hard 10 GiB
            # per-repo cache budget. With the four Swatinem rust caches also in
            # that budget, every save evicted the master nix cache by LRU — so
            # the next nix run restored nothing and recompiled wayle-deps from
            # scratch (~30 min) on *every* push, lockfile change or not.
            - name: Restore Nix store cache
              uses: nix-community/cache-nix-action/restore@v7
              with:
                  primary-key: nix-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'flake.lock', 'nix/package.nix') }}
                  restore-prefixes-first-match: nix-${{ runner.os }}-

            # Push everything built during this run to the attic cache. The
            # action installs a cached attic-client (no `nix run` cold eval) and
            # pushes in a post-job step. Runs on master pushes and same-repo PRs
            # (both have the token) so PR-built deps are in attic before merge.
            # Fork PRs lack the secret and just pull via the substituter above.
            # Best-effort: large-path 504s don't fail the job. The master-only
            # GH /nix/store cache above is the primary cross-run reuse path.
            - name: Setup attic push
              if: >-
                  github.event_name == 'push' ||
                  github.event.pull_request.head.repo.full_name == github.repository
              uses: ryanccn/attic-action@v0
              with:
                  endpoint: https://nix.stubbe.dev
                  cache: wayle
                  token: ${{ secrets.ATTIC_TOKEN }}

            - name: Build package
              # --accept-flake-config: honor the flake's nixConfig substituter
              # (the system extra_nix_config above sets it too, but this trusts
              # the flake's own setting and silences the untrusted-config warning).
              run: nix build '.?submodules=1#wayle' -L --accept-flake-config

            # Save /nix/store ONLY on master pushes — never on PRs. One master
            # nix cache fits comfortably under the 10 GiB budget; per-PR copies
            # do not, and evicting the master cache is what forced the deps
            # rebuild. purge drops stale nix-${os}-* keys (e.g. from an old
            # Cargo.lock) so the budget keeps shrinking instead of growing. Saves
            # only when the exact key is absent, so a no-op restore-hit run skips
            # re-uploading 3.2 GiB.
            - name: Save Nix store cache
              if: github.event_name == 'push' && github.ref == 'refs/heads/master'
              uses: nix-community/cache-nix-action/save@v7
              with:
                  primary-key: nix-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'flake.lock', 'nix/package.nix') }}
                  purge: true
                  purge-prefixes: nix-${{ runner.os }}-
                  purge-created: 0
                  purge-primary-key: never

    ci-status:
        name: CI Status
        if: always()
        needs: [check, ubuntu, fedora, nix]
        runs-on: ubuntu-latest
        steps:
            - name: Check results
              run: |
                  if [[ "${{ needs.check.result }}" == "failure" || \
                        "${{ needs.ubuntu.result }}" == "failure" || \
                        "${{ needs.nix.result }}" == "failure" || \
                        "${{ needs.fedora.result }}" == "failure" ]]; then
                    echo "One or more checks failed"
                    exit 1
                  fi
                  echo "All checks passed or were skipped"
