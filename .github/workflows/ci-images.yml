name: CI images

# Build the baked CI base images (deps + Rust toolchain + mold) and push them
# to GHCR. CI/release jobs pull these instead of installing deps every run.
#
# Triggers: when a Dockerfile changes, weekly (pick up upstream base-image
# security updates + toolchain bumps), and on manual dispatch.
#
# NOTE: the GHCR packages must be set to public visibility once (Packages →
# wayle/ci-* → Package settings) so fork PRs can pull anonymously.

on:
    push:
        branches: [master]
        paths:
            - ".github/docker/**"
            - ".github/workflows/ci-images.yml"
    schedule:
        - cron: "0 4 * * 1" # Mondays 04:00 UTC
    workflow_dispatch:

permissions:
    contents: read
    packages: write

concurrency:
    group: ci-images-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build ${{ matrix.distro }} image
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                distro: [arch, ubuntu, fedora]
        steps:
            - uses: actions/checkout@v6

            - uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push
              uses: docker/build-push-action@v6
              with:
                  context: .github/docker
                  file: .github/docker/Dockerfile.${{ matrix.distro }}
                  push: true
                  tags: ghcr.io/${{ github.repository }}/ci-${{ matrix.distro }}:latest
                  cache-from: type=gha,scope=ci-${{ matrix.distro }}
                  cache-to: type=gha,scope=ci-${{ matrix.distro }},mode=max
