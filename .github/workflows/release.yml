name: Release

on:
    push:
        tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

permissions:
    contents: write

env:
    CARGO_TERM_COLOR: always

jobs:
    changelog:
        name: Changelog
        runs-on: ubuntu-latest
        outputs:
            changelog: ${{ steps.changelog.outputs.changes }}
        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Generate changelog
              id: changelog
              uses: requarks/changelog-action@v1
              with:
                  token: ${{ secrets.GITHUB_TOKEN }}
                  tag: ${{ github.ref_name }}
                  excludeTypes: build,chore,style

            - name: Verify tag matches Cargo.toml version
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  CARGO_VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{/^version/p}' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
                  if [ -z "$CARGO_VERSION" ]; then
                      echo "Failed to parse version from Cargo.toml"
                      exit 1
                  fi
                  if [ "$VERSION" != "$CARGO_VERSION" ]; then
                      echo "Tag $VERSION does not match Cargo.toml version $CARGO_VERSION"
                      exit 1
                  fi

            - name: Create GitHub release
              uses: ncipollo/release-action@v1
              with:
                  tag: ${{ github.ref_name }}
                  name: ${{ github.ref_name }}
                  body: ${{ steps.changelog.outputs.changes }}
                  draft: true
                  token: ${{ secrets.GITHUB_TOKEN }}

    build:
        name: Build (${{ matrix.arch }})
        needs: changelog
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/stubbedev/wayle/ci-arch:latest
        strategy:
            matrix:
                arch: [x86_64]
        env:
            RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
        steps:
            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Fix git ownership
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            - uses: Swatinem/rust-cache@v2

            - name: Build release binaries
              run: cargo build --release --locked

            - name: Build archive
              run: ./scripts/ci/build-archive.sh target/release "${GITHUB_REF_NAME#v}" "${{ matrix.arch }}"

            - name: Upload to release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  ARCH="${{ matrix.arch }}"
                  gh release upload "${{ github.ref_name }}" \
                    "wayle-${VERSION}-${ARCH}-linux.tar.gz" \
                    --clobber

    nix:
        name: Nix build + cache
        needs: changelog
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
              with:
                  submodules: recursive

            - uses: cachix/install-nix-action@v31
              with:
                  extra_nix_config: |
                      experimental-features = nix-command flakes
                      # Pull from the self-hosted attic cache (same as CI).
                      extra-substituters = https://nix.stubbe.dev/wayle
                      extra-trusted-public-keys = wayle:XD2O2h1Mmka+VegRi2JY7ywNbG9al+TUAZp6CObizFU=

            # Restore /nix/store from the GitHub Actions cache (shared with the
            # CI nix job via the lockfile key) so a tag build reuses the cached
            # wayle-deps instead of recompiling. See ci.yml for rationale.
            - uses: nix-community/cache-nix-action@v7
              with:
                  primary-key: nix-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'flake.lock', 'nix/package.nix') }}
                  restore-prefixes-first-match: nix-${{ runner.os }}-

            # Push the release build closure to the attic cache — the single
            # source of truth for both CI and releases.
            - name: Setup attic push
              uses: ryanccn/attic-action@v0
              with:
                  endpoint: https://nix.stubbe.dev
                  cache: wayle
                  token: ${{ secrets.ATTIC_TOKEN }}

            - name: Build and push release package
              run: nix build '.?submodules=1#wayle' -L

    ubuntu:
        name: Package (Ubuntu ${{ matrix.arch }})
        needs: changelog
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/stubbedev/wayle/ci-ubuntu:latest
        strategy:
            matrix:
                arch: [x86_64]
        env:
            RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Fix Git ownership
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            - uses: Swatinem/rust-cache@v2

            - name: Build release binaries
              run: cargo build --release --locked

            - name: Build archive
              run: ./scripts/ci/build-archive.sh target/release "${GITHUB_REF_NAME#v}" "${{ matrix.arch }}"

            - name: Build Ubuntu package
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  ./scripts/ci/build-packages.sh "wayle-${VERSION}-${{ matrix.arch }}-linux.tar.gz" "${VERSION}" deb

            - name: Upload to release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release upload "${{ github.ref_name }}" \
                    debbuild/DEBS/*/*.deb \
                    --clobber

    fedora:
        name: Package (Fedora ${{ matrix.arch }})
        needs: changelog
        runs-on: ubuntu-latest
        container:
            image: ghcr.io/stubbedev/wayle/ci-fedora:latest
        strategy:
            matrix:
                arch: [x86_64]
        env:
            RUSTFLAGS: "-C linker=clang -C link-arg=-fuse-ld=mold"
        steps:
            - name: Checkout repository
              uses: actions/checkout@v6
              with:
                  submodules: recursive

            - name: Fix Git ownership
              run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

            - name: Install RPM build dependencies
              run: |
                  VERSION=$(sed -n '/\[workspace\.package\]/,/\[/{/^version/p}' Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
                  DATE="$(LC_ALL=C date '+%a %b %d %Y')"
                  sed \
                    -e "s/@VERSION@/${VERSION}/g" \
                    -e "s/@DATE@/${DATE}/g" \
                    packaging/rpm/wayle.spec.in >/tmp/wayle.spec
                  dnf -y --setopt=install_weak_deps=False builddep /tmp/wayle.spec

            - uses: Swatinem/rust-cache@v2

            - name: Build release binaries
              run: cargo build --release --locked

            - name: Build archive
              run: ./scripts/ci/build-archive.sh target/release "${GITHUB_REF_NAME#v}" "${{ matrix.arch }}"

            - name: Build Fedora package
              run: |
                  VERSION="${GITHUB_REF_NAME#v}"
                  ./scripts/ci/build-packages.sh "wayle-${VERSION}-${{ matrix.arch }}-linux.tar.gz" "${VERSION}" rpm

            - name: Upload to release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  ARCH="${{ matrix.arch }}"
                  gh release upload "${{ github.ref_name }}" \
                    rpmbuild/RPMS/${ARCH}/*.rpm \
                    --clobber

    checksums:
        name: Checksums
        needs: [changelog, build, ubuntu, fedora]
        runs-on: ubuntu-latest
        steps:
            - name: Download assets
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release download "${{ github.ref_name }}" \
                    --repo "${{ github.repository }}" \
                    --pattern "*.tar.gz" \
                    --pattern "*.deb" \
                    --pattern "*.rpm" \
                    --dir release

            - name: Generate SHA256SUMS
              run: cd release && sha256sum *.tar.gz *.deb *.rpm > ../SHA256SUMS

            - name: Upload checksums
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: gh release upload "${{ github.ref_name }}" --repo "${{ github.repository }}" SHA256SUMS --clobber

    publish:
        name: Publish release
        needs: checksums
        runs-on: ubuntu-latest
        steps:
            - name: Undraft release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false
