# xdg-desktop-portal routing for a Wayle session.
#
# Install as ~/.config/xdg-desktop-portal/wayle-portals.conf and select with
# XDG_CURRENT_DESKTOP=wayle, or as the per-desktop default
# /usr/share/xdg-desktop-portal/wayle-portals.conf.
#
# Interfaces Wayle implements natively route to `wayle`; the generic
# GTK-dialog interfaces (FileChooser, Print, Account, AppChooser, Email)
# are delegated to xdg-desktop-portal-gtk. Each phase that adds a native
# interface also adds its line here.

[preferred]
default=gtk
org.freedesktop.impl.portal.Settings=wayle
org.freedesktop.impl.portal.Lockdown=wayle
org.freedesktop.impl.portal.ScreenCast=wayle
org.freedesktop.impl.portal.Screenshot=wayle
org.freedesktop.impl.portal.RemoteDesktop=wayle
